services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${PG_DATABASE:-codeatlas}
      POSTGRES_USER: ${PG_USER:-codeatlas}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-codeatlas_dev}
    ports:
      - "127.0.0.1:${PG_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${PG_USER:-codeatlas}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  api-gateway:
    build:
      context: ../../
      dockerfile: services/api-gateway/Dockerfile
    ports:
      - "127.0.0.1:${PORT:-3000}:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-3000}
      PG_HOST: ${PG_HOST:-postgres}
      PG_PORT: ${PG_PORT:-5432}
      PG_DATABASE: ${PG_DATABASE:-codeatlas}
      PG_USER: ${PG_USER:-codeatlas}
      PG_PASSWORD: ${PG_PASSWORD:-codeatlas_dev}
      RAG_ENGINE_URL: http://rag-engine:8001
      UPLOAD_DIR: /app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads

  ingestion-service:
    build:
      context: ../../
      dockerfile: services/ingestion-service/Dockerfile
    environment:
      PG_HOST: ${PG_HOST:-postgres}
      PG_PORT: ${PG_PORT:-5432}
      PG_DATABASE: ${PG_DATABASE:-codeatlas}
      PG_USER: ${PG_USER:-codeatlas}
      PG_PASSWORD: ${PG_PASSWORD:-codeatlas_dev}
      UPLOAD_DIR: /app/uploads
      POLL_INTERVAL: ${POLL_INTERVAL:-5000}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads

volumes:
  pgdata:
  uploads:
