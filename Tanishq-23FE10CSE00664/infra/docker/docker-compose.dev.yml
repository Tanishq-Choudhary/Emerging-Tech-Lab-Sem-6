services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: codeatlas
      POSTGRES_USER: codeatlas
      POSTGRES_PASSWORD: codeatlas_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codeatlas"]
      interval: 5s
      timeout: 3s
      retries: 5

  api-gateway:
    build:
      context: ../../
      dockerfile: services/api-gateway/Dockerfile
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      PG_HOST: postgres
      PG_PORT: 5432
      PG_DATABASE: codeatlas
      PG_USER: codeatlas
      PG_PASSWORD: codeatlas_dev
      RAG_ENGINE_URL: http://host.docker.internal:8001
      UPLOAD_DIR: /app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../../services/api-gateway/src:/app/services/api-gateway/src
      - uploads_dev:/app/uploads

  ingestion-service:
    build:
      context: ../../
      dockerfile: services/ingestion-service/Dockerfile
    environment:
      PG_HOST: postgres
      PG_PORT: 5432
      PG_DATABASE: codeatlas
      PG_USER: codeatlas
      PG_PASSWORD: codeatlas_dev
      UPLOAD_DIR: /app/uploads
      POLL_INTERVAL: 3000
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../../services/ingestion-service/src:/app/services/ingestion-service/src
      - uploads_dev:/app/uploads

volumes:
  pgdata_dev:
  uploads_dev:
